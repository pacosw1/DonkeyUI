name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Build (macOS)
        run: swift build

      - name: Test (macOS)
        run: swift test

      - name: Build (iOS - Release)
        run: |
          # Pick first available iPhone simulator
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "import json,sys; devs=json.load(sys.stdin)['devices']; phones=[d['name'] for r in devs.values() for d in r if 'iPhone' in d['name'] and d['isAvailable']]; print(phones[0] if phones else 'iPhone 17 Pro')")
          echo "Using simulator: $DEVICE"
          xcodebuild build -scheme DonkeyUI -destination "platform=iOS Simulator,name=$DEVICE,OS=latest" -configuration Release -skipPackagePluginValidation
