name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Build (macOS)
        run: swift build

      - name: Test (macOS)
        run: swift test

      - name: Build (iOS - Release)
        run: xcodebuild build -scheme DonkeyUI -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' -configuration Release -skipPackagePluginValidation
