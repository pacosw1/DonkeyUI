name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Xcode ${{ matrix.xcode }})
    runs-on: macos-14
    strategy:
      matrix:
        xcode: ['15.4', '16.0']
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Build (macOS)
        run: swift build

      - name: Test (macOS)
        run: swift test

      - name: Build (iOS)
        run: xcodebuild build -scheme DonkeyUI -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' -skipPackagePluginValidation

      - name: Build (iOS - Release)
        run: xcodebuild build -scheme DonkeyUI -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' -configuration Release -skipPackagePluginValidation
