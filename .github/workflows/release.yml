name: Release

# Auto-bumps version on push to main based on commit messages:
#   "fix: ..." or "bug: ..."    → patch (1.0.0 → 1.0.1)
#   "feat: ..." or "add: ..."   → minor (1.0.0 → 1.1.0)
#   "breaking: ..." or "BREAKING CHANGE" in body → major (1.0.0 → 2.0.0)
#   anything else                → patch
#
# To skip a release, include [skip release] in your commit message.
# Manual releases: push a tag like v1.2.3 to trigger without auto-bump.

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate: only release if tests pass
  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      - name: Build
        run: swift build -c release
      - name: Test
        run: swift test
      - name: Build iOS
        run: xcodebuild build -scheme DonkeyUI -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' -configuration Release -skipPackagePluginValidation

  release:
    name: Auto Release
    needs: test
    runs-on: ubuntu-latest
    # Only run on main push, not on tag push (tags already have a version)
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Get latest tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Parse current version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION%-*}"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # Get commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" ${LATEST_TAG}..HEAD)
          fi

          # Determine bump type from commit messages
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^(breaking|BREAKING CHANGE)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^(feat|add|feature):"; then
            BUMP="minor"
          fi

          # Apply bump
          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Bump: $BUMP ($LATEST_TAG → v$NEW_VERSION)"

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=${{ steps.bump.outputs.latest_tag || 'v0.0.0' }}
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${LATEST_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: |
            ## DonkeyUI v${{ steps.bump.outputs.new_version }}

            ### Installation

            ```swift
            .package(url: "https://github.com/pacosw1/DonkeyUI.git", from: "${{ steps.bump.outputs.new_version }}")
            ```

            ### Changes (${{ steps.bump.outputs.bump }} release)

            ${{ steps.changelog.outputs.commits }}
          draft: false
          prerelease: false

  # Manual tag push — just create the release (no auto-bump)
  manual-release:
    name: Manual Release
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## DonkeyUI v${{ steps.version.outputs.version }}

            ### Installation

            ```swift
            .package(url: "https://github.com/pacosw1/DonkeyUI.git", from: "${{ steps.version.outputs.version }}")
            ```

            ### Changes

            ${{ steps.changelog.outputs.commits }}
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
